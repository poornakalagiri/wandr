version: '3.9'

services:

  # ── PostgreSQL ─────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_DB: wandrdb
      POSTGRES_USER: wandr
      POSTGRES_PASSWORD: wandr123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wandr -d wandrdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MongoDB ────────────────────────────────────────────────
  mongo:
    image: mongo:7
    restart: always
    environment:
      MONGO_INITDB_DATABASE: wandrdb
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"

  # ── FastAPI Backend ────────────────────────────────────────
  backend:
    build: ./backend
    restart: always
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      mongo:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://wandr:wandr123@db:5432/wandrdb
      MONGODB_URL: mongodb://mongo:27017
      MONGODB_DB: wandrdb
      SECRET_KEY: wandr-change-this-secret-key-in-production-32chars
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "10080"
    volumes:
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  # ── Frontend (Nginx) ───────────────────────────────────────
  frontend:
    image: nginx:alpine
    restart: always
    ports:
      - "3000:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - backend

volumes:
  postgres_data:
  mongo_data:
